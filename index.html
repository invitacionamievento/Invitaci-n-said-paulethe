<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Especial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-accent: #ffffff;
            --glass-bg: rgba(0, 0, 0, 0.55);
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #111;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            text-align: center;
        }

        /* --- FONDO DE VIDEO Y FOTOS --- */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -3;
        }
        #bg-video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }

        .photo-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .animated-photo {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: zoomAndFade 12s infinite;
        }
        .animated-photo:nth-child(1) { animation-delay: 0s; }
        .animated-photo:nth-child(2) { animation-delay: 4s; }
        .animated-photo:nth-child(3) { animation-delay: 8s; }

        @keyframes zoomAndFade {
            0% { opacity: 0; transform: scale(1); }
            20% { opacity: 0.4; }
            45% { opacity: 0; transform: scale(1.15); }
            100% { opacity: 0; }
        }

        /* --- INTERFAZ DE ENTRADA --- */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.8s ease;
        }
        .btn-enter {
            padding: 20px 40px;
            background: none;
            border: 2px solid white;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-enter:hover { background: white; color: black; }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content {
            display: none;
            opacity: 0;
            width: 90%;
            max-width: 450px;
            z-index: 1;
            transition: opacity 1.5s ease;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 { font-weight: 900; font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 10px; }
        h2 { font-weight: 300; font-size: 1.5rem; margin-bottom: 20px; }

        /* --- MENSAJE CON TRANSICIÓN DE LÍNEAS --- */
        .message-container { min-height: 100px; margin: 30px 0; }
        .text-line {
            display: block;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInLine 1s forwards;
            font-size: 1.2rem;
            margin-bottom: 8px;
            font-weight: 300;
        }

        @keyframes fadeInLine {
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            text-decoration: none;
            color: black;
            background: white;
            border-radius: 50px;
            font-weight: 700;
            margin: 10px 5px;
            font-size: 0.9rem;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-map { background: transparent; color: white; border: 1px solid white; }

        .music-control {
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-enter" onclick="startExperience()">Abrir Invitación</button>
    </div>

    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="tu-video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="photo-overlay">
        <img src="foto1.jpg" class="animated-photo">
        <img src="foto2.jpg" class="animated-photo">
        <img src="foto3.jpg" class="animated-photo">
    </div>

    <div id="main-content">
        <button class="music-control" onclick="toggleMusic()">
            <span id="m-icon">⏸️</span> <span id="m-text">PAUSAR MÚSICA</span>
        </button>

        <div class="glass-card">
            <h1>¡ESTÁS INVITADO!</h1>
            <h2>Said & Paulethe</h2>
            
            <div class="message-container" id="message-container">
                </div>

            <p style="margin-bottom: 5px; font-weight: 700;">DOMINGO 12 DE ABRIL</p>
            <p style="font-weight: 300; opacity: 0.8;">14:00 Horas</p>
            <p style="margin-top: 15px;">📍 Diversiones PoingPoing</p>
            
            <div style="margin-top: 25px;">
                <a href="https://wa.me/529515841063?text=Confirmado!" class="btn">CONFIRMAR</a>
                <a href="https://maps.app.goo.gl/xxx" target="_blank" class="btn btn-map">UBICACIÓN</a>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <script>
        const music = document.getElementById("bgMusic");
        const overlay = document.getElementById("overlay");
        const mainContent = document.getElementById("main-content");
        const msgContainer = document.getElementById("message-container");

        function startExperience() {
            music.play().catch(e => console.log("Auto-play blocked"));
            overlay.style.opacity = "0";
            
            setTimeout(() => {
                overlay.style.display = "none";
                mainContent.style.display = "block";
                setTimeout(() => { mainContent.style.opacity = "1"; }, 50);
                showLines();
            }, 800);
        }

        function showLines() {
            const lines = [
                "Nos encantaría que nos acompañes",
                "en este día tan especial.",
                "¡Preparamos algo increíble!"
            ];
            
            lines.forEach((text, i) => {
                setTimeout(() => {
                    const span = document.createElement("span");
                    span.className = "text-line";
                    span.innerText = text;
                    msgContainer.appendChild(span);
                }, i * 1200); // 1.2 segundos entre cada línea
            });
        }

        function toggleMusic() {
            const icon = document.getElementById("m-icon");
            const txt = document.getElementById("m-text");
            if (music.paused) {
                music.play();
                icon.innerText = "⏸️"; txt.innerText = "PAUSAR MÚSICA";
            } else {
                music.pause();
                icon.innerText = "▶️"; txt.innerText = "PONER MÚSICA";
            }
        }
    </script>

</body>
</html>
