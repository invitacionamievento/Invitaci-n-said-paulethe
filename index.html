<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Especial - Said & Paulethe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass-bg: rgba(0, 0, 0, 0.6);
            --accent: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        /* --- FONDO DE VIDEO --- */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -3;
        }
        #bg-video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.5);
        }

        /* --- GALERÍA DE FOTOS (ROBLOX Y MINECRAFT) --- */
        .photo-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
        }
        .animated-photo {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: zoomFade 10s infinite ease-in-out;
        }
        
        /* Alternancia entre la foto de Minecraft y Roblox */
        .photo-1 { background-image: url('images (26).jpeg'); animation-delay: 0s; }
        .photo-2 { background-image: url('robi.jpeg'); animation-delay: 5s; }

        @keyframes zoomFade {
            0% { opacity: 0; transform: scale(1); }
            20% { opacity: 0.4; } /* Opacidad suave para no tapar el video */
            50% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 0; }
        }

        /* --- INTERFAZ --- */
        #overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s;
        }
        .btn-start {
            padding: 15px 35px;
            background: none;
            border: 1px solid white;
            color: white;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #main-content {
            display: none;
            opacity: 0;
            width: 90%;
            max-width: 400px;
            z-index: 10;
            transition: opacity 1s;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-weight: 900; font-size: 2.2rem; margin-bottom: 5px; }
        .names { font-weight: 300; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 30px; opacity: 0.9; }

        /* --- LÍNEAS DE MENSAJE --- */
        .message-box { min-height: 90px; margin-bottom: 25px; }
        .text-line {
            display: block;
            opacity: 0;
            transform: translateY(10px);
            animation: appear 1s forwards;
            font-weight: 300;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        @keyframes appear {
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            display: block;
            padding: 15px;
            margin: 10px 0;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .btn-primary { background: white; color: black; }
        .btn-secondary { border: 1px solid white; color: white; }

        .music-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-start" onclick="init()">Abrir Invitación</button>
    </div>

    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="tu-video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="photo-overlay">
        <div class="animated-photo photo-1" style="background-size: cover; background-position: center;"></div>
        <div class="animated-photo photo-2" style="background-size: cover; background-position: center;"></div>
    </div>

    <div id="main-content">
        <button class="music-btn" onclick="toggleMusic()">🎵 <span id="mtxt">PAUSAR</span></button>
        
        <div class="glass-card">
            <h1>¡FIESTA!</h1>
            <p class="names">SAID & PAULETHE</p>

            <div class="message-box" id="msg-box"></div>

            <div style="border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
                <p style="font-weight: 700;">DOMINGO 12 DE ABRIL</p>
                <p style="font-weight: 300; font-size: 0.9rem; margin-bottom: 20px;">14:00 HRS | DIVERSIONES POING POING</p>
                
                <a href="https://wa.me/529515841063" class="btn btn-primary">CONFIRMAR ASISTENCIA</a>
                <a href="https://maps.google.com" class="btn btn-secondary">VER UBICACIÓN</a>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <script>
        const music = document.getElementById("bgMusic");
        
        function init() {
            music.play();
            document.getElementById("overlay").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("overlay").style.display = "none";
                const main = document.getElementById("main-content");
                main.style.display = "block";
                setTimeout(() => { main.style.opacity = "1"; }, 50);
                startText();
            }, 800);
        }

        function startText() {
            const lines = [
                "¡Nuestros personajes favoritos!",
                "Se unen para celebrar...",
                "¡Y tú eres el invitado especial!"
            ];
            const box = document.getElementById("msg-box");
            lines.forEach((t, i) => {
                setTimeout(() => {
                    const s = document.createElement("span");
                    s.className = "text-line";
                    s.innerText = t;
                    box.appendChild(s);
                }, i * 1500);
            });
        }

        function toggleMusic() {
            const t = document.getElementById("mtxt");
            if (music.paused) { music.play(); t.innerText = "PAUSAR"; }
            else { music.pause(); t.innerText = "PLAY"; }
        }
    </script>
</body>
</html>
