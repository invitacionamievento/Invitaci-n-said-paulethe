<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Nivel de Fiesta Desbloqueado! - Said y Paulethe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        :root {
            --sonic-blue: #0054b2;
            --sonic-accent: #00ff00;
            --mc-sky: #78A7FF;
            --text-light: #fff;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-light);
            text-align: center;
            min-height: 120vh; /* Un poco más alto para asegurar que haya scroll */
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-color: var(--mc-sky);
            background-image: linear-gradient(rgba(120, 167, 255, 0.7), rgba(120, 167, 255, 0.7)), url('images (26).jpeg');
            background-size: cover;
            animation: moveBackground 60s linear infinite; 
            padding-top: 20px;
        }

        @keyframes moveBackground {
            from { background-position: 0 0; }
            to { background-position: 100% 0; }
        }

        .music-header {
            width: 90%;
            max-width: 400px;
            margin-bottom: 25px;
            z-index: 100;
            position: sticky; /* Se queda arriba para que siempre puedan pausar */
            top: 10px;
        }

        .btn-music-big {
            background: linear-gradient(45deg, #ffcc00, #ffaa00);
            color: #000;
            border: 4px solid #fff;
            padding: 18px;
            border-radius: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 0px #b37700, 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-music-big:active { transform: translateY(3px); box-shadow: 0 3px 0px #b37700; }

        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .container { padding: 0 20px 60px; width: 100%; max-width: 600px; z-index: 1; }

        .info-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow-card);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.4rem;
            color: #fff;
            text-shadow: 3px 3px 0px var(--sonic-blue);
            margin-bottom: 20px;
        }

        h2 { font-family: 'Press Start 2P', cursive; font-size: 0.8rem; color: var(--sonic-accent); margin: 10px 0; }

        .btn {
            display: block;
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            margin: 15px auto;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-confirm { background: #25d366; }
        .btn-map { background: #f44336; }
    </style>
</head>
<body>

    <div class="music-header">
        <button id="musicBtn" class="btn-music-big pulse" onclick="toggleMusic(event)">
            <span id="music-icon">▶️</span> 
            <span id="btn-text">PONER MÚSICA</span>
        </button>
    </div>

    <div class="container">
        <h1>¡FIESTA!</h1>
        <div class="info-card">
            <h2>SAID NEFTALÍ (9)</h2>
            <p>&</p>
            <h2>PAULETHE ITANDEHUI (6)</h2>
            <p style="margin: 15px 0;">¡Nivel de diversión: MÁXIMO!</p>
            <hr style="opacity: 0.2; margin: 15px 0;">
            <p>📅 Domingo 12 de Abril, 2026</p>
            <a href="https://maps.app.goo.gl/mts8bRb9jtbAcLdi6" target="_blank" class="btn btn-map">📍 VER UBICACIÓN</a>
        </div>

        <div class="info-card">
            <p>¿Te unes a la partida?</p>
            <a href="https://wa.me/529515841063?text=¡Confirmo mi asistencia a la fiesta de Said y Paulethe! 🎮✨" class="btn btn-confirm">✅ CONFIRMAR ASISTENCIA</a>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="01. Minecraft - Lava Chicken (Original Game Soundtrack).mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");
        const icon = document.getElementById("music-icon");
        const txt = document.getElementById("btn-text");
        let isPlaying = false;

        // Función Maestra para iniciar audio
        function startAudio() {
            if (!isPlaying) {
                music.play().then(() => {
                    isPlaying = true;
                    updateUI(true);
                    // Una vez que suena, quitamos los escuchas para ahorrar batería
                    removeListeners();
                }).catch(e => console.log("Bloqueado por navegador"));
            }
        }

        function toggleMusic(e) {
            if(e) e.stopPropagation();
            if (music.paused) {
                music.play();
                isPlaying = true;
                updateUI(true);
            } else {
                music.pause();
                isPlaying = false;
                updateUI(false);
            }
        }

        function updateUI(playing) {
            icon.innerHTML = playing ? "⏸️" : "▶️";
            txt.innerHTML = playing ? "PAUSAR MÚSICA" : "PONER MÚSICA";
            playing ? btn.classList.remove("pulse") : btn.classList.add("pulse");
        }

        // Agregamos múltiples detectores para asegurar el inicio
        window.addEventListener('touchstart', startAudio);
        window.addEventListener('mousedown', startAudio);
        window.addEventListener('scroll', startAudio);
        window.addEventListener('wheel', startAudio);

        function removeListeners() {
            window.removeEventListener('touchstart', startAudio);
            window.removeEventListener('mousedown', startAudio);
            window.removeEventListener('scroll', startAudio);
            window.removeEventListener('wheel', startAudio);
        }
    </script>

</body>
</html>
