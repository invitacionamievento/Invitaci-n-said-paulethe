<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Nivel de Fiesta Desbloqueado! - Said y Paulethe</title>
    
    <meta property="og:title" content="¡Nivel de Fiesta Desbloqueado! - Said y Paulethe">
    <meta property="og:description" content="🎮 Minecraft o Roblox 🟥 ¡Elige tu aventura! Domingo 12 de abril.">
    <meta property="og:image" content="https://invitacionamievento.github.io/Invitaci-n-said-paulethe/images%20(26).jpeg">
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --said-sky: #78A7FF;
            --said-card-bg: rgba(16, 16, 16, 0.9);
            --said-accent: #00ff00;
            --said-gold: #FFD700;
            --roblox-red: #CD1C1A;
            --roblox-dark: #121314;
            --roblox-orange: #F68802;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ANIMACIÓN DE DERECHA A IZQUIERDA */
        @keyframes scrollBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* CAPA DE FONDO CON MOVIMIENTO Y DESENFOQUE */
        body::before {
            content: "";
            position: fixed;
            top: -5%; left: -5%; /* Margen extra para evitar bordes blancos por el blur */
            width: 110%; height: 110%;
            z-index: -1;
            background-size: cover;
            background-repeat: no-repeat;
            filter: blur(4px); /* Difuminado sutil */
            -webkit-filter: blur(4px);
            animation: scrollBackground 45s ease-in-out infinite; /* Movimiento de lado a lado */
            transition: background 0.8s ease;
        }

        /* ESTILOS DE FONDO POR MODO */
        body.boy-mode::before {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('images (26).jpeg');
        }
        body.pink-mode::before {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('robi.jpeg');
        }

        /* --- ESTILO SAID --- */
        body.boy-mode { font-family: 'Segoe UI', sans-serif; color: #fff; }
        body.boy-mode h1, body.boy-mode h2, body.boy-mode .btn { font-family: 'Press Start 2P', cursive; }
        body.boy-mode h1 { text-shadow: 4px 4px 0px #0054b2; margin-top: 20px; font-size: 1.2rem;}
        body.boy-mode .info-card { background: var(--said-card-bg); border: 4px solid #555; box-shadow: inset -4px -4px 0px #000; }
        body.boy-mode .btn-music-inline { background: var(--said-gold); color: #000; border: 3px solid #fff; font-size: 0.6rem; box-shadow: inset -3px -3px 0px #b8860b; }

        /* --- ESTILO PAULETHE --- */
        body.pink-mode { font-family: 'Hanken Grotesk', sans-serif; color: #fff; }
        body.pink-mode h1 { font-size: 2.2rem; text-transform: uppercase; letter-spacing: -1px; margin-top: 20px;}
        body.pink-mode .info-card { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        body.pink-mode .btn-music-inline { background: var(--roblox-orange); color: #fff; border: none; font-weight: 800; box-shadow: 0 4px 0px #a65c00; }

        /* --- INTERFAZ COMÚN --- */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; transition: 0.5s; }
        .select-banner { border: 4px solid #fff; padding: 15px; margin-bottom: 30px; background: #1a1a1a; }
        .select-banner p { font-family: 'Press Start 2P', cursive; font-size: 0.8rem; color: gold; }
        .btn-select { padding: 25px; cursor: pointer; width: 280px; margin: 10px; border: 4px solid #fff; color: white; }
        .btn-select.said { background: #3c3c3c; font-family: 'Press Start 2P', cursive; border-color: #00ff00; }
        .btn-select.paulethe { background: var(--roblox-red); font-family: 'Hanken Grotesk', sans-serif; font-weight: 900; border-radius: 8px; font-size: 1.2rem; border: none;}

        #main-content { display: none; opacity: 0; width: 100%; max-width: 500px; padding: 20px; z-index: 1; margin-bottom: 50px; }
        .info-card { padding: 25px; margin-bottom: 20px; }
        .btn { display: block; padding: 18px; text-decoration: none; color: white !important; margin: 10px auto; width: 100%; max-width: 280px; }
        .btn-music-inline { padding: 10px 20px; cursor: pointer; margin-bottom: 15px; border-radius: 5px; }

        .btn-confirm { background: #25d366; border-radius: 8px; font-weight: bold; }
        .btn-map { background: #f44336; border-radius: 8px; font-weight: bold; }

        /* FOOTER */
        footer { margin-top: auto; padding: 30px 20px; background: rgba(0,0,0,0.95); width: 100%; border-top: 2px solid #333; z-index: 2; position: relative; }
        .footer-brand { color: #ffcc00; font-family: 'Press Start 2P', cursive; font-size: 0.8rem; display: block; margin-bottom: 15px; }
        .btn-footer-wa { display: inline-block; background: #25d366; color: white !important; text-decoration: none; padding: 12px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="select-banner"><p>¡ELIGE TU JUEGO!</p></div>
        <button class="btn-select said" onclick="revealInvitation('boy')">MINECRAFT<br><small>(SAID)</small></button>
        <button class="btn-select paulethe" onclick="revealInvitation('girl')">ROBLOX<br><small>(PAULETHE)</small></button>
    </div>

    <div id="main-content">
        <button id="musicBtn" class="btn-music-inline" onclick="toggleMusic()">
            <span id="music-icon">⏸️</span> <span id="btn-text">PAUSAR MÚSICA</span>
        </button>

        <h1>¡ESTÁS INVITADO!</h1>

        <div class="info-card">
            <h2>SAID NEFTALÍ (9)</h2>
            <p>&</p>
            <h2>PAULETHE ITANDEHUI (6)</h2>
            <p id="invitation-text" style="margin: 15px 0;">¡Eres parte de la misión!<br>Prepárate para la diversión 🎉</p>
            <hr style="opacity: 0.2; margin: 15px 0;">
            <p>📅 Domingo 12 de Abril, 2026</p>
            <p>📍 Diversiones PoingPoing</p>
            <a href="https://maps.app.goo.gl/9" target="_blank" class="btn btn-map">VER MAPA</a>
        </div>

        <div class="info-card">
            <p id="unirse-text">¿TE UNES A LA PARTIDA?</p>
            <a href="https://wa.me/529515841063?text=¡Confirmo mi asistencia!" class="btn btn-confirm">CONFIRMAR</a>
        </div>

        <div style="background: rgba(0,0,0,0.5); display: inline-block; padding: 10px; border-radius: 5px;">
            <img src="https://counter10.optistats.ovh/private/freecounterstat.php?c=6m8l1n6q7l1b1n6l7l1b1n6l7l1b1n6l" border="0">
        </div>
    </div>

    <audio id="bgMusicBoy" loop><source src="01. Minecraft - Lava Chicken (Original Game Soundtrack).mp3" type="audio/mpeg"></audio>
    <audio id="bgMusicGirl" loop><source src="Roblox.mp3" type="audio/mpeg"></audio>
    <audio id="clickSound"><source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg"></audio>

    <script>
        let currentMusic;
        const musicBoy = document.getElementById("bgMusicBoy");
        const musicGirl = document.getElementById("bgMusicGirl");
        const click = document.getElementById("clickSound");
        const overlay = document.getElementById("overlay");
        const mainContent = document.getElementById("main-content");

        function revealInvitation(choice) {
            click.play();
            if (choice === 'girl') {
                document.body.className = 'pink-mode';
                document.getElementById('invitation-text').innerHTML = "¡Estamos de Fiesta!<br>¡Eres parte de este gran bloque de diversión!<br>Prepárate para una tarde épica 🟥🎮";
                currentMusic = musicGirl;
            } else {
                document.body.className = 'boy-mode';
                currentMusic = musicBoy;
            }
            currentMusic.play().catch(e => console.log("Play error"));
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.style.display = "none";
                mainContent.style.display = "block";
                setTimeout(() => { mainContent.style.opacity = "1"; }, 50);
            }, 500);
        }

        function toggleMusic() {
            const icon = document.getElementById("music-icon");
            const txt = document.getElementById("btn-text");
            if (currentMusic.paused) {
                currentMusic.play();
                icon.innerHTML = "⏸️"; txt.innerHTML = "PAUSAR MÚSICA";
            } else {
                currentMusic.pause();
                icon.innerHTML = "▶️"; txt.innerHTML = "PONER MÚSICA";
            }
        }
    </script>

    <footer>
        <span class="footer-brand">ALFA MASTER</span>
        <a href="https://wa.me/529512625159?text=Hola! Me interesa una invitación personalizada" class="btn-footer-wa">
            📲 CONTACTAR WHATSAPP
        </a>
    </footer>
</body>
</html>
