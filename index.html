<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Nivel de Fiesta Desbloqueado! - Said y Paulethe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        :root {
            --sonic-blue: #0054b2;
            --sonic-accent: #00ff00;
            --mc-sky: #78A7FF;
            --text-light: #fff;
            --shadow-card: 0 15px 35px rgba(0,0,0,0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-light);
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-color: #000;
            /* Se mantiene tu imagen de fondo */
            background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('images (26).jpeg');
            background-size: cover;
            background-position: center;
            animation: moveBackground 80s linear infinite; 
        }

        @keyframes moveBackground {
            from { background-position: 0 0; }
            to { background-position: 100% 0; }
        }

        /* --- PANTALLA DE INICIO --- */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.6s ease;
        }

        .btn-start-giant {
            background: linear-gradient(45deg, #e60000, #ff4d4d);
            color: white;
            border: 4px solid #fff;
            padding: 35px 20px;
            border-radius: 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.1rem;
            cursor: pointer;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 0px #800000, 0 15px 25px rgba(0,0,0,0.5);
            animation: pulse-giant 1.5s infinite;
        }

        @keyframes pulse-giant {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
            width: 100%;
            max-width: 550px;
            padding: 20px;
            z-index: 1;
        }

        /* RECUADROS OSCUROS TRANSPARENTES (DARK GLASS) */
        .info-card {
            background: rgba(0, 0, 0, 0.65); /* Negro oscuro transparente */
            backdrop-filter: blur(15px); /* Desenfoque de fondo */
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15); /* Borde suave */
            box-shadow: var(--shadow-card);
            margin-bottom: 25px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 3px 3px 0px var(--sonic-blue), 0 0 10px rgba(255,255,255,0.3);
            margin-bottom: 25px;
        }

        h2 { font-family: 'Press Start 2P', cursive; font-size: 0.85rem; color: var(--sonic-accent); margin: 12px 0; }

        .btn-music-inline {
            background: rgba(255, 255, 255, 0.1);
            color: #ffcc00;
            border: 2px solid #ffcc00;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            cursor: pointer;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn {
            display: block;
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            margin: 15px auto;
            max-width: 280px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn-confirm { background: #25d366; border-bottom: 4px solid #128c7e; }
        .btn-map { background: #f44336; border-bottom: 4px solid #b71c1c; }
        .btn:active { transform: translateY(2px); border-bottom-width: 2px; }

    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-start-giant" onclick="revealInvitation()">
            ¡PRESIONA AQUÍ PARA EMPEZAR!
        </button>
    </div>

    <div id="main-content">
        
        <button id="musicBtn" class="btn-music-inline" onclick="toggleMusic()">
            <span id="music-icon">⏸️</span> <span id="btn-text">PAUSAR MÚSICA</span>
        </button>

        <h1>¡FIESTA!</h1>

        <div class="info-card">
            <h2>SAID NEFTALÍ (9)</h2>
            <p style="font-family: 'Press Start 2P'; font-size: 0.7rem; margin: 10px 0; color: #aaa;">&</p>
            <h2>PAULETHE ITANDEHUI (6)</h2>
            <p style="margin: 20px 0; font-weight: bold; color: #fff;">¡Nivel de diversión: MÁXIMO!</p>
            <hr style="opacity: 0.1; margin: 20px 0;">
            <p style="color: #00e5ff; font-weight: bold;">📅 Domingo 12 de Abril, 2026</p>
            <a href="https://maps.app.goo.gl/TuUbicacion" target="_blank" class="btn btn-map">📍 VER UBICACIÓN</a>
        </div>

        <div class="info-card">
            <p style="margin-bottom: 15px;">¿Te unes a la partida?</p>
            <a href="https://wa.me/529515841063?text=¡Confirmo mi asistencia a la fiesta de Said y Paulethe! 🎮✨" class="btn btn-confirm">✅ CONFIRMAR ASISTENCIA</a>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="01. Minecraft - Lava Chicken (Original Game Soundtrack).mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById("bgMusic");
        const mainContent = document.getElementById("main-content");
        const overlay = document.getElementById("overlay");
        const icon = document.getElementById("music-icon");
        const txt = document.getElementById("btn-text");

        function revealInvitation() {
            music.play().catch(e => console.log("Audio play blocked"));
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.style.display = "none";
                mainContent.style.display = "block";
                setTimeout(() => {
                    mainContent.style.opacity = "1";
                }, 50);
            }, 600);
        }

        function toggleMusic() {
            if (music.paused) {
                music.play();
                icon.innerHTML = "⏸️";
                txt.innerHTML = "PAUSAR MÚSICA";
            } else {
                music.pause();
                icon.innerHTML = "▶️";
                txt.innerHTML = "PONER MÚSICA";
            }
        }
    </script>

</body>
</html>
