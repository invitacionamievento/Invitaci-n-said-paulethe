    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES DE COLOR --- */
        :root {
            --sonic-blue: #0054b2;
            --sonic-accent: #00ff00; /* Neón Green de las Esmeraldas */
            --mc-dirt-light: #8B4513;
            --mc-grass: #388700;
            --text-dark: #111;
            --text-light: #fff;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.5);
            
            /* Colores para el fondo de Minecraft */
            --mc-sky: #78A7FF;
            --mc-cloud: #fff;
        }

        /* --- ESTILOS GENERALES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Cursor de Minecraft (opcional) */
            cursor: url('https://cur.cursors-4u.net/games/gam-11/gam1071.cur'), auto; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Fuente moderna para texto largo */
            color: var(--text-light);
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            
            /* --- FONDO CON MOVIMIENTO (Cielo de Minecraft) --- */
            background-color: var(--mc-sky);
            background-image: 
                linear-gradient(rgba(120, 167, 255, 0.8), rgba(120, 167, 255, 0.8)), /* Capa de color para atenuar */
                url('https://i.imgur.com/vHqY7Gk.png'); /* Imagen de nubes cuadradas de Minecraft (panorámica) */
            background-size: cover;
            background-position: center;
            /* Animación del fondo */
            animation: moveBackground 60s linear infinite; 
        }

        /* Animación para que el fondo se desplace lentamente */
        @keyframes moveBackground {
            from { background-position: 0 0; }
            to { background-position: 100% 0; }
        }

        /* --- EFECTO DE ANILLOS FLOTANTES (ESTILO SONIC) --- */
        .sonic-rings {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* No interfiere con los clics */
            z-index: 0;
            overflow: hidden;
        }

        .ring {
            position: absolute;
            width: 20px; height: 20px;
            background-color: transparent;
            border: 4px solid gold;
            border-radius: 50%;
            box-shadow: 0 0 10px gold, 0 0 20px gold;
            opacity: 0.5;
            animation: floatRings 15s linear infinite;
        }

        /* Posiciones y retrasos aleatorios para los anillos */
        .ring:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .ring:nth-child(2) { top: 30%; left: 80%; animation-delay: 2s; width: 15px; height: 15px; }
        .ring:nth-child(3) { top: 70%; left: 15%; animation-delay: 5s; }
        .ring:nth-child(4) { top: 50%; left: 50%; animation-delay: 8s; width: 25px; height: 25px; }
        .ring:nth-child(5) { top: 85%; left: 90%; animation-delay: 11s; }

        @keyframes floatRings {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* --- TÍTULOS CON EFECTO --- */
        .titles-container {
            margin-bottom: 30px;
            z-index: 1;
            animation: slideInDown 1s ease-out;
        }

        h1 {
            font-family: 'Press Start 2P', cursive; /* Fuente pixelada */
            font-size: 2rem;
            text-transform: uppercase;
            color: var(--text-light);
            text-shadow: 
                0 0 10px gold,
                0 0 20px gold,
                0 0 40px gold;
            animation: glitch 3s infinite;
        }

        @media (max-width: 600px) { h1 { font-size: 1.2rem; } }

        /* --- TARJETAS MODERNAS (Glassmorphism) --- */
        .container {
            padding: 20px;
            width: 100%;
            max-width: 700px;
            z-index: 1;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.1); /* Efecto cristal */
            backdrop-filter: blur(10px); /* Desenfoque detrás de la tarjeta */
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow-card);
            margin-bottom: 30px;
            animation: fadeIn 1.5s ease-in;
            position: relative;
            overflow: hidden;
        }

        /* Brillo interno para las tarjetas */
        .info-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: cardShine 10s infinite;
        }

        @keyframes cardShine {
            0% { transform: rotate(45deg) translate(-150%, -150%); }
            100% { transform: rotate(45deg) translate(150%, 150%); }
        }

        h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.3rem;
            color: var(--sonic-accent);
            margin-bottom: 10px;
            text-shadow: 1px 1px 0px #000;
        }

        @media (max-width: 600px) { h2 { font-size: 0.9rem; } }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ddd;
            margin-bottom: 25px;
        }

            align-items: center;
        }

        .btn {

            align-items: center;

            text-transform: uppercase;
            letter-spacing: 1px;
        }
