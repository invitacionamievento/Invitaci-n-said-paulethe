<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Especial - Gianella & Martin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --lion-accent: #f0a500; /* Oro Rey León */
            --minnie-accent: #ff007f; /* Rosa Minnie */
            --text-color: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #fce4ec; /* Fondo rosa pálido de base */
            color: var(--text-color);
            min-height: 100vh;
            overflow: hidden; /* Importante para el efecto de scroll de fotos */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- FONDO DE VÍDEO CON EFECTO DIVIDIDO --- */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -3;
            display: flex;
        }
        #bg-video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.8) saturate(1.2);
        }

        /* --- GALERÍA DE FOTOS TEMÁTICAS --- */
        .photo-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .animated-photo {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: zoomAndFade 12s infinite ease-in-out;
        }
        
        /* Fotos referenciales basadas en tus vídeos */
        .photo-1 { background-image: url('images (26).jpeg'); animation-delay: 0s; } /* Escena Selva Rey León */
        .photo-2 { background-image: url('robi.jpeg'); animation-delay: 4s; } /* Escena Rosa Minnie Mouse */
        .photo-3 { background-image: url('images (26).jpeg'); animation-delay: 8s; } /* Selva de nuevo para cerrar ciclo */

        @keyframes zoomAndFade {
            0% { opacity: 0; transform: scale(1); }
            15% { opacity: 0.3; } /* Opacidad baja para el efecto superpuesto */
            45% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 0; }
        }

        /* --- INTERFAZ DE BIENVENIDA --- */
        #overlay {
            position: fixed;
            inset: 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }
        .btn-enter {
            padding: 15px 35px;
            background: none;
            border: 2px solid var(--minnie-accent);
            color: var(--minnie-accent);
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 50px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-enter:hover { background: var(--minnie-accent); color: #fff; }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content {
            display: none;
            opacity: 0;
            width: 90%;
            max-width: 420px;
            z-index: 10;
            transition: opacity 1.5s ease;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 32px rgba(255,0,127,0.15);
            position: relative;
        }

        /* Títulos temáticos */
        h1 { font-weight: 900; font-size: 2.4rem; letter-spacing: -1px; margin-bottom: 5px; color: var(--text-color); }
        .names { font-weight: 300; font-size: 1.3rem; margin-bottom: 25px; color: #555; }

        /* --- MENSAJE CON TRANSICIÓN DE LÍNEAS --- */
        .message-container { min-height: 100px; margin: 25px 0; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px;}
        .text-line {
            display: block;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInLine 1s forwards;
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: 400;
        }
        .text-line.highlight { font-weight: 700; color: var(--minnie-accent); }

        @keyframes fadeInLine {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Botones integrados */
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 30px; }
        .btn {
            display: block;
            padding: 15px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: transform 0.2s, background 0.3s;
        }
        .btn:active { transform: scale(0.97); }
        
        .btn-confirm { background: var(--minnie-accent); color: #fff; box-shadow: 0 4px 15px rgba(255,0,127,0.3); }
        .btn-confirm:hover { background: #e60073; }
        
        .btn-map { background: transparent; color: var(--text-color); border: 1px solid rgba(0,0,0,0.2); }
        .btn-map:hover { background: rgba(0,0,0,0.05); }

        /* Botón de música discreto */
        .music-control {
            margin-bottom: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-enter" onclick="startExperience()">Abrir Invitación 💖</button>
    </div>

    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="tu-video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="photo-overlay">
        <div class="animated-photo photo-1" style="background-size: cover; background-position: center;"></div>
        <div class="animated-photo photo-2" style="background-size: cover; background-position: center;"></div>
        <div class="animated-photo photo-3" style="background-size: cover; background-position: center;"></div>
    </div>

    <div id="main-content">
        <button class="music-control" onclick="toggleMusic()">
            🎵 <span id="m-icon">⏸️</span> <span id="m-text">PAUSAR</span>
        </button>

        <div class="glass-card">
            <h1>¡TE ESPERAMOS!</h1>
            <p class="names">Gianella (3) & Martin (1)</p>
            
            <div class="message-container" id="message-container">
                </div>

            <p style="font-weight: 700; color: #555;">DOMINGO 28 DE SEPTIEMBRE</p>
            <p style="font-weight: 300; font-size: 0.9rem; margin-bottom: 15px;">A las 4:30 P.M.</p>
            <p style="margin-top: 10px; color: var(--lion-accent); font-weight: 700;">📍 Lugar: Mágicas Invitaciones</p>
            
            <div class="btn-group">
                <a href="https://wa.me/529515841063" class="btn btn-confirm">CONFIRMAR MI ASISTENCIA</a>
                <a href="http://googleusercontent.com/maps.google.com/3" target="_blank" class="btn btn-map">VER UBICACIÓN</a>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <script>
        const music = document.getElementById("bgMusic");
        const overlay = document.getElementById("overlay");
        const mainContent = document.getElementById("main-content");
        const msgContainer = document.getElementById("message-container");

        function startExperience() {
            // Intenta reproducir música (puede ser bloqueado por navegador si no hay interacción)
            music.play().catch(e => console.log("Auto-play blocked"));
            
            // Oculta el overlay con transición
            overlay.style.opacity = "0";
            
            setTimeout(() => {
                overlay.style.display = "none";
                mainContent.style.display = "block";
                
                // Hace aparecer el contenido principal suavemente
                setTimeout(() => { mainContent.style.opacity = "1"; }, 50);
                
                // Inicia la animación de texto por líneas
                showLines();
            }, 800);
        }

        function showLines() {
            // Mensaje personalizado basado en tus referencias
            const lines = [
                { text: "La princesa Gianella", highlight: true },
                { text: "y el Rey Martin", highlight: true },
                { text: "te invitan a celebrar" },
                { text: "una tarde llena de magia" },
                { text: "y de muchas sorpresas." },
                { text: "¡No Faltes!", highlight: true }
            ];
            
            lines.forEach((line, i) => {
                setTimeout(() => {
                    const span = document.createElement("span");
                    span.className = "text-line";
                    if (line.highlight) span.classList.add("highlight");
                    span.innerText = line.text;
                    msgContainer.appendChild(span);
                }, i * 1100); // 1.1 segundos de retraso entre cada línea
            });
        }

        function toggleMusic() {
            const icon = document.getElementById("m-icon");
            const txt = document.getElementById("m-text");
            if (music.paused) {
                music.play();
                icon.innerText = "⏸️"; txt.innerText = "PAUSAR";
            } else {
                music.pause();
                icon.innerText = "▶️"; txt.innerText = "PLAY";
            }
        }
    </script>

</body>
</html>
