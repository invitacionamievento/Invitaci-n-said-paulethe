<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Nivel de Fiesta Desbloqueado! - Said y Paulethe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        :root {
            --sonic-blue: #0054b2;
            --sonic-accent: #00ff00;
            --mc-sky: #78A7FF;
            --text-light: #fff;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-light);
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-color: var(--mc-sky);
            background-image: linear-gradient(rgba(120, 167, 255, 0.7), rgba(120, 167, 255, 0.7)), url('https://i.imgur.com/vHqY7Gk.png');
            background-size: cover;
            animation: moveBackground 60s linear infinite; 
            padding-top: 20px;
        }

        @keyframes moveBackground {
            from { background-position: 0 0; }
            to { background-position: 100% 0; }
        }

        /* --- BOTÓN DE MÚSICA GRANDE --- */
        .music-header {
            width: 90%;
            max-width: 400px;
            margin-bottom: 25px;
            z-index: 100;
        }

        .btn-music-big {
            background: linear-gradient(45deg, #ffcc00, #ffaa00);
            color: #000;
            border: 4px solid #fff;
            padding: 20px;
            border-radius: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 0px #b37700, 0 15px 25px rgba(0,0,0,0.3);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn-music-big:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #b37700, 0 5px 15px rgba(0,0,0,0.3);
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Anillos de Sonic */
        .sonic-rings .ring {
            position: fixed;
            width: 20px; height: 20px;
            border: 4px solid gold;
            border-radius: 50%;
            box-shadow: 0 0 10px gold;
            opacity: 0.4;
            animation: floatRings 12s linear infinite;
            z-index: 0;
        }

        @keyframes floatRings {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container { padding: 0 20px 40px; width: 100%; max-width: 600px; z-index: 1; }

        .info-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow-card);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 3px 3px 0px var(--sonic-blue), 0 0 15px rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }

        h2 { font-family: 'Press Start 2P', cursive; font-size: 0.9rem; color: var(--sonic-accent); margin: 10px 0; }

        .btn {
            display: block;
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            margin: 15px auto;
            max-width: 320px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 1rem;
        }

        .btn-confirm { background: #25d366; border-bottom: 5px solid #128c7e; }
        .btn-map { background: #f44336; border-bottom: 5px solid #b71c1c; }
        .btn:hover { transform: translateY(-3px); }

    </style>
</head>
<body>

    <div class="music-header">
        <button id="musicBtn" class="btn-music-big pulse" onclick="toggleMusic()">
            <span id="music-icon">▶️</span> 
            <span id="btn-text">PONER MÚSICA</span>
        </button>
    </div>

    <div class="sonic-rings">
        <div class="ring" style="left: 10%; animation-delay: 0s;"></div>
        <div class="ring" style="left: 30%; animation-delay: 3s;"></div>
        <div class="ring" style="left: 70%; animation-delay: 6s;"></div>
        <div class="ring" style="left: 90%; animation-delay: 1s;"></div>
    </div>

    <div class="container">
        <h1>¡FIESTA!</h1>
        
        <div class="info-card">
            <h2>SAID NEFTALÍ (9)</h2>
            <p style="font-family: 'Press Start 2P'; font-size: 0.8rem;">&</p>
            <h2>PAULETHE ITANDEHUI (6)</h2>
            <p style="margin: 15px 0; font-weight: bold;">¡Nivel de diversión: MÁXIMO! Prepárate para la aventura.</p>
            <hr style="opacity: 0.2; margin: 15px 0;">
            <p>📅 Domingo 12 de Abril, 2026</p>
            <a href="https://maps.app.goo.gl/mts8bRb9jtbAcLdi6" target="_blank" class="btn btn-map">📍 VER UBICACIÓN</a>
        </div>

        <div class="info-card">
            <p>¿Te unes a la partida?</p>
            <a href="https://wa.me/529515841063?text=¡Confirmo mi asistencia a la fiesta de Said y Paulethe! 🎮✨" class="btn btn-confirm">✅ CONFIRMAR ASISTENCIA</a>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="robot/01. Minecraft - Lava Chicken (Original Game Soundtrack).mp3" type="audio/mpeg">
    </audio>

    <script>
        var music = document.getElementById("bgMusic");
        var btn = document.getElementById("musicBtn");
        var icon = document.getElementById("music-icon");
        var txt = document.getElementById("btn-text");

        function toggleMusic() {
            if (music.paused) {
                music.play();
                icon.innerHTML = "⏸️";
                txt.innerHTML = "PAUSAR MÚSICA";
                btn.classList.remove("pulse");
            } else {
                music.pause();
                icon.innerHTML = "▶️";
                txt.innerHTML = "PONER MÚSICA";
                btn.classList.add("pulse");
            }
        }
    </script>

</body>
</html>
