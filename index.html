<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Nivel de Fiesta Desbloqueado! - Said y Paulethe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        :root {
            --sonic-blue: #0054b2;
            --sonic-accent: #00ff00;
            --mc-sky: #78A7FF;
            --text-light: #fff;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-light);
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-color: var(--mc-sky);
            background-image: linear-gradient(rgba(120, 167, 255, 0.3), rgba(120, 167, 255, 0.3)), url('images (26).jpeg');
            background-size: cover;
            animation: moveBackground 60s linear infinite; 
        }

        @keyframes moveBackground {
            from { background-position: 0 0; }
            to { background-position: 100% 0; }
        }

        /* --- PANTALLA DE INICIO (BOTÓN GRANDE) --- */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.5s ease;
        }

        .btn-start-giant {
            background: linear-gradient(45deg, #ff0000, #ff5555);
            color: white;
            border: 6px solid #fff;
            padding: 40px 20px;
            border-radius: 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 0px #880000, 0 20px 30px rgba(0,0,0,0.5);
            animation: pulse-giant 1.5s infinite;
        }

        @keyframes pulse-giant {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- CONTENIDO DE LA INVITACIÓN --- */
        #main-content {
            display: none; /* Se oculta al inicio */
            opacity: 0;
            transition: opacity 1s ease;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            z-index: 1;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow-card);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.4rem;
            color: #fff;
            text-shadow: 3px 3px 0px var(--sonic-blue);
            margin-bottom: 20px;
        }

        h2 { font-family: 'Press Start 2P', cursive; font-size: 0.8rem; color: var(--sonic-accent); margin: 10px 0; }

        /* Botón de música dentro de la invitación */
        .btn-music-inline {
            background: rgba(0, 0, 0, 0.5);
            color: #ffcc00;
            border: 2px solid #ffcc00;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            display: block;
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            margin: 15px auto;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 1rem;
        }
        .btn-confirm { background: #25d366; }
        .btn-map { background: #f44336; }

    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn-start-giant" onclick="revealInvitation()">
            ¡PRESIONA AQUÍ PARA EMPEZAR!
        </button>
    </div>

    <div id="main-content">
        
        <button id="musicBtn" class="btn-music-inline" onclick="toggleMusic()">
            <span id="music-icon">⏸️</span> <span id="btn-text">PAUSAR MÚSICA</span>
        </button>

        <h1>¡FIESTA!</h1>

        <div class="info-card">
            <h2>SAID NEFTALÍ (9)</h2>
            <p style="font-family: 'Press Start 2P'; font-size: 0.8rem; margin: 5px 0;">&</p>
            <h2>PAULETHE ITANDEHUI (6)</h2>
            <p style="margin: 15px 0; font-weight: bold;">¡Nivel de diversión: MÁXIMO!</p>
            <hr style="opacity: 0.2; margin: 15px 0;">
            <p>📅 Domingo 12 de Abril, 2026</p>
            <a href="https://maps.app.goo.gl/mts8bRb9jtbAcLdi6" target="_blank" class="btn btn-map">📍 VER UBICACIÓN</a>
        </div>

        <div class="info-card">
            <p>¿Te unes a la partida?</p>
            <a href="https://wa.me/529515841063?text=¡Confirmo mi asistencia a la fiesta de Said y Paulethe! 🎮✨" class="btn btn-confirm">✅ CONFIRMAR ASISTENCIA</a>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="01. Minecraft - Lava Chicken (Original Game Soundtrack).mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById("bgMusic");
        const mainContent = document.getElementById("main-content");
        const overlay = document.getElementById("overlay");
        const icon = document.getElementById("music-icon");
        const txt = document.getElementById("btn-text");

        function revealInvitation() {
            // Iniciar música
            music.play().catch(e => console.log("Error al reproducir"));
            
            // Ocultar overlay
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.style.display = "none";
                // Mostrar invitación
                mainContent.style.display = "block";
                setTimeout(() => {
                    mainContent.style.opacity = "1";
                }, 50);
            }, 500);
        }

        function toggleMusic() {
            if (music.paused) {
                music.play();
                icon.innerHTML = "⏸️";
                txt.innerHTML = "PAUSAR MÚSICA";
            } else {
                music.pause();
                icon.innerHTML = "▶️";
                txt.innerHTML = "PONER MÚSICA";
            }
        }
    </script>

</body>
</html>
